# Конфиг обучения 1D-CNN на предзащитном датасете (этап 19, фаза 2).
# Параметры подобраны под сжатую Kaggle-сессию (~2–3 часа на T4) и набор
# 2000 реальных спектров NIST WebBook. Hyperparameter sweep здесь НЕ
# проводится (по CLAUDE.md §11 это для фазы 3). Цель — F1 macro 0.4–0.6.

data:
  # Путь в Kaggle Notebook'е (см. docs/KAGGLE_TRAINING.md). При локальном
  # прогоне переопредели через --override data.parquet=...
  parquet: /kaggle/input/spectra-id-predefense/predefense_labeled.parquet
  spectrum_length: 3601
  n_labels: 25
  split:
    # Сплит по InChI Key — гарантирует, что одна молекула не утечёт
    # из train в val/test (см. ml/pipelines/training/split.py).
    strategy: by_inchi_key
    train: 0.70
    val: 0.15
    test: 0.15
  augmentation: true

model:
  # Те же 5 блоков, что в cnn1d.yaml — архитектура из таблицы 6.1.
  blocks:
    - { in_channels: 1,   out_channels: 32,  kernel_size: 11, padding: 5, dropout: 0.10 }
    - { in_channels: 32,  out_channels: 64,  kernel_size: 9,  padding: 4, dropout: 0.15 }
    - { in_channels: 64,  out_channels: 128, kernel_size: 7,  padding: 3, dropout: 0.20 }
    - { in_channels: 128, out_channels: 256, kernel_size: 5,  padding: 2, dropout: 0.25 }
    - { in_channels: 256, out_channels: 256, kernel_size: 3,  padding: 1, dropout: 0.0  }
  embedding_dim: 128
  head_dropout: 0.30
  n_classes: 25

loss:
  type: bce
  pos_weight: auto
  pos_weight_cap: 100.0
  focal:
    gamma: 2.0
    alpha: 0.5

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05

training:
  batch_size: 64       # больше, чем 32 в синтетике — реальный объём данных
  epochs: 100
  early_stop_patience: 10
  threshold_search: per_class
  fixed_threshold: 0.5
  num_workers: 2       # Kaggle T4 → 4 CPU, 2 worker'а — безопасный дефолт
  checkpoint_every: 5  # сохранять каждые 5 эпох (страховка от обрывов)

seed: 42

output:
  experiment_root: /kaggle/working/experiments
  model_dir: /kaggle/working/checkpoints
  model_name: cnn1d-predefense
  model_version: 0.5.0
