# Конфиг контрастного обучения двухбашенной схемы на предзащитном датасете
# (этап 19, фаза 2). Запускается после успешного обучения 1D-CNN; CNN
# инициализируется из его чекпойнта, ChemBERTa заморожена. Цель —
# top-5 retrieval recall 0.35–0.55 (HP sweep — фаза 3).

data:
  parquet: /kaggle/input/spectra-id-predefense/predefense_labeled.parquet
  spectrum_length: 3601
  n_labels: 25
  split:
    strategy: by_inchi_key
    train: 0.70
    val: 0.15
    test: 0.15
  augmentation: true

cnn:
  blocks:
    - { in_channels: 1,   out_channels: 32,  kernel_size: 11, padding: 5, dropout: 0.10 }
    - { in_channels: 32,  out_channels: 64,  kernel_size: 9,  padding: 4, dropout: 0.15 }
    - { in_channels: 64,  out_channels: 128, kernel_size: 7,  padding: 3, dropout: 0.20 }
    - { in_channels: 128, out_channels: 256, kernel_size: 5,  padding: 2, dropout: 0.25 }
    - { in_channels: 256, out_channels: 256, kernel_size: 3,  padding: 1, dropout: 0.0  }
  embedding_dim: 128
  head_dropout: 0.30
  n_classes: 25
  init_checkpoint: /kaggle/working/checkpoints/cnn1d-predefense-0.5.0/best.pt

spectrum_tower:
  projection_dim: 128
  projection_hidden: 256
  projection_dropout: 0.10
  freeze_encoder: false

molecule_tower:
  model_name: seyonec/ChemBERTa-zinc-base-v1
  projection_dim: 128
  projection_hidden: 384
  projection_dropout: 0.10
  freeze_encoder: true   # фаза 2 — обучаем только проекционную голову
  max_length: 128

loss:
  bce:
    pos_weight: auto
    pos_weight_cap: 100.0
  infonce:
    initial_temperature: 0.07
    learnable: true
  bce_weight: 1.0
  nce_weight: 0.5

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05

training:
  batch_size: 32
  warmup_epochs: 2
  epochs: 50
  early_stop_patience: 8
  threshold_search: per_class
  fixed_threshold: 0.5
  num_workers: 2
  grad_clip: 1.0
  checkpoint_every: 5

seed: 42

output:
  experiment_root: /kaggle/working/experiments
  model_dir: /kaggle/working/checkpoints
  model_name: contrastive-predefense
  model_version: 0.5.0
