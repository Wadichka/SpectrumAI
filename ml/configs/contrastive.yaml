# Конфиг контрастного обучения двухбашенной схемы (Этап 6).
# Параметры — глава 6: §6.6 (контрастное обучение), §6.7 (молекулярный
# энкодер), §6.8 (процесс обучения). Длина входа 3601 — CLAUDE.md §7.

data:
  parquet: ml/data/synthetic.parquet
  spectrum_length: 3601
  n_labels: 25
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  augmentation: true

# CNN-энкодер для спектральной башни. Те же параметры, что в cnn1d.yaml
# (таблица 6.1). Опционально инициализируется из чекпойнта Этапа 5.
cnn:
  blocks:
    - { in_channels: 1,   out_channels: 32,  kernel_size: 11, padding: 5, dropout: 0.10 }
    - { in_channels: 32,  out_channels: 64,  kernel_size: 9,  padding: 4, dropout: 0.15 }
    - { in_channels: 64,  out_channels: 128, kernel_size: 7,  padding: 3, dropout: 0.20 }
    - { in_channels: 128, out_channels: 256, kernel_size: 5,  padding: 2, dropout: 0.25 }
    - { in_channels: 256, out_channels: 256, kernel_size: 3,  padding: 1, dropout: 0.0  }
  embedding_dim: 128
  head_dropout: 0.30
  n_classes: 25
  init_checkpoint: models/ircnn-multilabel-0.1.0/best.pt  # null чтобы обучать с нуля

spectrum_tower:
  projection_dim: 128
  projection_hidden: 256
  projection_dropout: 0.10
  freeze_encoder: false

molecule_tower:
  model_name: seyonec/ChemBERTa-zinc-base-v1
  projection_dim: 128
  projection_hidden: 384
  projection_dropout: 0.10
  freeze_encoder: true
  max_length: 128

loss:
  bce:
    pos_weight: auto
    pos_weight_cap: 100.0
  infonce:
    initial_temperature: 0.07
    learnable: true
  bce_weight: 1.0
  nce_weight: 0.5

optim:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_ratio: 0.05

training:
  batch_size: 32
  warmup_epochs: 2
  epochs: 8
  early_stop_patience: 5
  threshold_search: per_class
  fixed_threshold: 0.5
  num_workers: 0
  grad_clip: 1.0

seed: 42

output:
  experiment_root: ml/experiments
  model_dir: models
  model_name: ircnn-contrastive
  model_version: 0.2.0
