# Docker-стек SpectrumAI (Этап 15, глава 4.6 «standalone»).
# Запуск:
#   1. Скопировать .env.example → .env, поправить пароли при необходимости.
#   2. docker compose up --build -d
#
# Снаружи открыты только:
#   - 80   — nginx (фронтенд + reverse-proxy /api/*)
#   - 8000 — FastAPI (для Swagger UI на http://localhost:8000/docs)
# PostgreSQL и Redis общаются внутри docker-сети, наружу не выставляются.

services:
  postgres:
    image: postgres:16-alpine
    container_name: spectrumai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spectrumai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spectrumai}
      POSTGRES_DB: ${POSTGRES_DB:-spectrumai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spectrumai} -d ${POSTGRES_DB:-spectrumai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: spectrumai-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: spectrumai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-spectrumai}:${POSTGRES_PASSWORD:-spectrumai}@postgres:5432/${POSTGRES_DB:-spectrumai}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      ML_CONTRASTIVE_CHECKPOINT: /models/ircnn-contrastive-0.2.0/best.pt
      ML_CNN_CHECKPOINT: /models/ircnn-multilabel-0.1.0/best.pt
      ML_FAISS_ROOT: /models/faiss/ircnn-contrastive-0.2.0
      ML_DEVICE: ${ML_DEVICE:-cpu}
    volumes:
      - ./models:/models:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: spectrumai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
