# Dev-окружение SpectrumAI: PostgreSQL, Redis, FastAPI-бэкенд, Vite-фронтенд.
# Точка входа: `docker compose up --build`. Каталоги backend/ и frontend/
# смонтированы как volume — изменения подхватываются без пересборки образа.

services:
  postgres:
    image: postgres:16-alpine
    container_name: spectrumai-postgres
    environment:
      POSTGRES_USER: spectrumai
      POSTGRES_PASSWORD: spectrumai
      POSTGRES_DB: spectrumai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectrumai -d spectrumai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: spectrumai-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spectrumai-backend
    environment:
      DATABASE_URL: postgresql+psycopg://spectrumai:spectrumai@postgres:5432/spectrumai
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: INFO
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - ./models:/models:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spectrumai-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
