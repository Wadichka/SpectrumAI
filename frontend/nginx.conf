# Nginx-конфигурация production-фронтенда SpectrumAI.
# Раздаёт собранный Vite-бандл из /usr/share/nginx/html и проксирует
# /api/* на backend:8000 (общение в внутренней docker-сети).
#
# client_max_body_size 500M — соответствует пределу пакетной загрузки
# из главы 4.11 (одиночный файл — 50 МБ, архив — 500 МБ).

server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API запросы проксируем на бэкенд.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # API-ответы не должны кэшироваться браузером — иначе после обновления
        # frontend-бандла пользователь может увидеть «застрявший» старый ответ.
        # POST по спеке не кэшируется, но защищаемся от агрессивных кэшей.
        add_header Cache-Control "no-store" always;
    }

    # index.html — точка входа SPA. Никогда не кэшируем, чтобы новые версии
    # бандла подтягивались сразу после `docker compose up --build`. Assets
    # (assets/*.js, *.css) уже идут с hash-именами от Vite — там кэш OK.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Долгоживущий кэш для статики с hash-именами (Vite assets/).
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA: любой неизвестный путь отдаёт index.html (React Router).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
